{{- $fullname := include "voice-ai.fullname" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-tts
  labels:
    {{- include "voice-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: tts
spec:
  {{- if not .Values.tts.autoscaling.enabled }}
  replicas: {{ .Values.tts.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: tts
  template:
    metadata:
      labels:
        {{- include "voice-ai.labels" . | nindent 8 }}
        app.kubernetes.io/component: tts
    spec:
      containers:
        - name: tts
          image: {{ include "voice-ai.image" (dict "root" . "repo" .Values.tts.image) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PIPER_VOICE
              value: {{ .Values.tts.voice | quote }}
          ports:
            - containerPort: {{ .Values.tts.port }}
          readinessProbe:
            httpGet: { path: /voices, port: {{ .Values.tts.port }} }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /voices, port: {{ .Values.tts.port }} }
            periodSeconds: 20
          resources:
            {{- toYaml .Values.tts.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-tts
  labels:
    {{- include "voice-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: tts
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: tts
  ports:
    - port: {{ .Values.tts.port }}
      targetPort: {{ .Values.tts.port }}
{{- if .Values.tts.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $fullname }}-tts
  labels:
    {{- include "voice-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: tts
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $fullname }}-tts
  minReplicas: {{ .Values.tts.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.tts.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.tts.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
